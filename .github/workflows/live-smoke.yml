name: Live Dashboard Smoke

on:
  schedule:
    - cron: "17 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-dashboard-smoke
  cancel-in-progress: false

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check public dashboard URLs
        shell: pwsh
        run: ./tools/verify-live-dashboard.ps1
